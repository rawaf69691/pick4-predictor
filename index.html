<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick 4 Prediction Engine</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:600px;
background:#111827;
padding:30px;
border-radius:14px;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h1{
text-align:center;
color:#38bdf8;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:20px;
padding:12px;
background:#1f2937;
border-radius:8px;
}

.number{
font-size:22px;
font-weight:bold;
}

.box{
font-size:12px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="container">

<h1>Pick 4 Predictor</h1>

<p id="today"></p>

<label>Draw</label>
<select id="drawType">
<option value="midday">Midday</option>
<option value="evening">Evening</option>
</select>

<label>Play Amount</label>
<select id="bet">
<option value="1">$1</option>
<option value="0.5">$0.50</option>
</select>

<button onclick="predict()">Generate Predictions</button>

<div id="results"></div>

</div>

<script>
let engineData;

// 1. Fetch the actual 30-year pattern data from your JSON
fetch("pick4_prediction_engine.json")
    .then(res => res.json())
    .then(data => {
        engineData = data;
        document.getElementById("today").innerText = "Using Florida Data Updated: " + data.last_update;
    })
    .catch(err => {
        console.error("JSON not found:", err);
        document.getElementById("results").innerHTML = "<p style='color:red'>Error: JSON file not found in repository.</p>";
    });

// 2. This function detects the Box type (4-way, 12-way, etc.)
function classifyBox(num) {
    let counts = {};
    for (let d of num) { counts[d] = (counts[d] || 0) + 1; }
    let values = Object.values(counts);
    if (values.includes(4)) return "1-Way (AAAA)";
    if (values.includes(3)) return "4-Way (AAAB)"; // This is your $1 4-Way play!
    if (values.length == 2 && values.includes(2)) return "6-Way (AABB)";
    if (values.length == 3) return "12-Way (AABC)";
    return "24-Way (ABCD)";
}

// 3. This function generates the list when you click the button
function predict() {
    if (!engineData) {
        alert("Data is still loading... please wait 5 seconds.");
        return;
    }

    let draw = document.getElementById("drawType").value;
    let picks = engineData[draw].top_picks; // Grabs the real numbers like 8823
    let html = "";

    picks.forEach((item, i) => {
        html += `
        <div class="result">
            <div class="number">#${i + 1} — ${item.number}</div>
            <div class="box" style="color:#38bdf8; font-weight:bold;">${classifyBox(item.number)}</div>
            <div class="box">Logic: ${item.reason}</div>
            <div class="box">Confidence: ${item.score}%</div>
        </div>
        `;
    });

    document.getElementById("results").innerHTML = html;
}
</script>

</body>

</html>
